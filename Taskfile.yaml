version: '3'

tasks:
  default:
    desc: List all tasks
    cmds: 
      - task --list-all
    silent: true

  build:
    desc: Build the cidr binary
    cmds:
      - go build -o cidr .
    generates:
      - cidr
    silent: true

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f cidr

  test:
    desc: Run all tests
    cmds:
      - go test ./... -v

  run:
    desc: Run the tool (pass args via --)
    cmds:
      - go run . {{.CLI_ARGS}}
